<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLM Youth Quiz | Cloud Edition</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --glass: rgba(255, 255, 255, 0.15);
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 30px;
            width: 85%; max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .header-tag {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; padding: 7px 18px;
            border-radius: 50px; display: inline-block;
            margin-bottom: 15px; letter-spacing: 1.5px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .progress-container {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 20px 0;
            overflow: hidden; display: none;
        }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.4s ease; }

        .question-box { font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; min-height: 70px; }

        .btn {
            background: rgba(255, 255, 255, 0.95);
            color: #1e3c72; border: none;
            padding: 16px; margin: 10px 0;
            width: 100%; border-radius: 18px;
            font-weight: 700; font-size: 1rem;
            transition: 0.3s all; cursor: pointer;
        }

        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--error) !important; color: white !important; }
        /* Special class to show the right answer after a mistake */
        .reveal { border: 3px solid var(--success) !important; background: rgba(46, 204, 113, 0.2) !important; color: white !important; }

        #sync-status { font-size: 0.75rem; color: #00ffcc; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-tag">WLM Youth Section</div>
        <div id="sync-status">📡 Syncing...</div>
        <div class="progress-container" id="p-container"><div class="progress-bar" id="p-bar"></div></div>
        <div id="main-display"></div>
        <div style="margin-top:25px; opacity:0.4; font-size:0.65rem;">WLM • DESIGNED BY CHEKWAS • V2.7</div>
    </div>

    <script>
        const SHEET_ID = "1RrgebuElaDoseB0t-wxl288SyN3PCjanxl8vw7Yxxq0";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`;
        
        let database = { "old": [], "new": [], "growth": [], "teens": [] };
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0; // SCORE TRACKER

        async function init() {
            try {
                const res = await fetch(SHEET_URL);
                const csv = await res.text();
                parseData(csv);
                showHome();
            } catch (e) { document.getElementById('sync-status').innerText = "⚠️ Offline"; }
        }

        function parseData(csv) {
            const rows = csv.split('\n').slice(1);
            let total = 0;
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 4) {
                    const cat = cols[0].trim().toLowerCase();
                    if (database[cat]) {
                        database[cat].push({
                            question: cols[1].trim(),
                            options: cols[2].split(';').map(o => o.trim()),
                            answer: cols[3].trim()
                        });
                        total++;
                    }
                }
            });
            document.getElementById('sync-status').innerText = `✅ ${total} Questions Ready`;
        }

        function showHome() {
            score = 0; // Reset score when going home
            document.getElementById('p-container').style.display = 'none';
            document.getElementById('main-display').innerHTML = `
                <h2>Select Challenge</h2>
                <button class="btn" onclick="start('old')">📜 Old Testament</button>
                <button class="btn" onclick="start('new')">📖 New Testament</button>
                <button class="btn" onclick="start('growth')">🌱 Spiritual Growth</button>
                <button class="btn" onclick="start('teens')">🙌 Teen Life</button>
            `;
        }

        function start(cat) {
            currentQuestions = database[cat];
            currentIndex = 0;
            if (!currentQuestions || currentQuestions.length === 0) return alert("Coming soon!");
            document.getElementById('p-container').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('p-bar').style.width = ((currentIndex / currentQuestions.length) * 100) + "%";

            document.getElementById('main-display').innerHTML = `
                <div style="font-size:0.8rem; margin-bottom:10px; opacity:0.7;">Question ${currentIndex + 1} of ${currentQuestions.length}</div>
                <div class="question-box">${q.question}</div>
                <div id="options"></div>
            `;
            
            q.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = opt;
                b.onclick = () => {
                    const all = document.querySelectorAll('#options .btn');
                    all.forEach(btn => btn.style.pointerEvents = 'none');

                    const isCorrect = opt.trim().toLowerCase() === q.answer.trim().toLowerCase();
                    
                    if(isCorrect) {
                        b.classList.add('correct');
                        score++;
                    } else {
                        b.classList.add('wrong');
                        // REVEAL LOGIC: Find and highlight the right answer
                        all.forEach(btn => {
                            if(btn.innerText.trim().toLowerCase() === q.answer.trim().toLowerCase()) {
                                btn.classList.add('reveal');
                            }
                        });
                    }

                    setTimeout(() => {
                        currentIndex++;
                        if (currentIndex < currentQuestions.length) renderQuestion();
                        else showFinish();
                    }, 2000); // 2 seconds so they can see the correct answer reveal
                };
                document.getElementById('options').appendChild(b);
            });
        }

        function showFinish() {
            const percent = (score / currentQuestions.length) * 100;
            let msg = percent >= 70 ? "Victory! 🏆" : "Good Try! 📖";
            let sub = percent >= 70 ? "Excellent spirit!" : "Keep studying the Word.";

            document.getElementById('p-bar').style.width = "100%";
            document.getElementById('main-display').innerHTML = `
                <h2 style="margin-bottom:10px;">${msg}</h2>
                <div style="font-size:3rem; font-weight:800; margin:20px 0;">${score}/${currentQuestions.length}</div>
                <p style="margin-bottom:30px; opacity:0.8;">${sub}</p>
                <button class="btn" onclick="showHome()" style="background:var(--primary); color:white;">Try Another</button>
            `;
        }

        init();
    </script>
</body>
</html>
