<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worshiplife Ministry Youth Section</title>
    <style>
        :root {
            --primary: #00d2ff; 
            --secondary: #2c3e50; 
            --glass: rgba(255, 255, 255, 0.15);
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 30px;
            width: 85%; max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wlm-logo {
            width: 100px;
            height: auto;
            margin-bottom: 12px;
            border-radius: 50%;
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.5));
        }

        .header-tag {
            background: linear-gradient(to right, #2c3e50, #00d2ff);
            font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; padding: 8px 20px;
            border-radius: 50px; display: inline-block;
            margin-bottom: 25px; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .progress-container {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 20px 0;
            overflow: hidden; display: none;
        }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.4s ease; }

        .question-box { font-size: 1.25rem; font-weight: 600; margin-bottom: 25px; min-height: 60px; line-height: 1.4; }

        .btn {
            background: rgba(255, 255, 255, 0.95);
            color: #1e3c72; border: none;
            padding: 16px; margin: 10px 0;
            width: 100%; border-radius: 18px;
            font-weight: 700; font-size: 1rem;
            transition: 0.2s all; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--error) !important; color: white !important; }
        .reveal { border: 3px solid var(--success) !important; background: rgba(46, 204, 113, 0.2) !important; color: white !important; }

        #sync-status { font-size: 0.7rem; color: #00ffcc; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <img src="1759316149196.jpg" alt="Worshiplife Logo" class="wlm-logo">
        <br>
        <div class="header-tag">Worshiplife Ministry Youth Section</div>
        <div id="sync-status">📡 Fetching Cloud Data...</div>
        
        <div class="progress-container" id="p-container"><div class="progress-bar" id="p-bar"></div></div>
        <div id="main-display"></div>
        
        <div style="margin-top:25px; opacity:0.3; font-size:0.6rem;">ENGINEERED BY CHEKWAS • V3.0</div>
    </div>

    <script>
        const SHEET_ID = "1RrgebuElaDoseB0t-wxl288SyN3PCjanxl8vw7Yxxq0";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`;
        
        let database = { "old": [], "new": [], "growth": [], "teens": [] };
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function init() {
            try {
                const res = await fetch(SHEET_URL);
                const csv = await res.text();
                parseData(csv);
                showHome();
            } catch (e) { document.getElementById('sync-status').innerText = "⚠️ Connection Error"; }
        }

        function parseData(csv) {
            const rows = csv.split('\n').slice(1);
            let total = 0;
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 4) {
                    const cat = cols[0].trim().toLowerCase();
                    if (database[cat]) {
                        database[cat].push({
                            question: cols[1].trim(),
                            options: cols[2].split(';').map(o => o.trim()),
                            answer: cols[3].trim()
                        });
                        total++;
                    }
                }
            });
            document.getElementById('sync-status').innerText = `✅ ${total} Questions Ready`;
        }

        function showHome() {
            score = 0;
            document.getElementById('p-container').style.display = 'none';
            document.getElementById('main-display').innerHTML = `
                <h3 style="margin-bottom:20px;">Ready for the Challenge?</h3>
                <button class="btn" onclick="start('old')">📜 Old Testament</button>
                <button class="btn" onclick="start('new')">📖 New Testament</button>
                <button class="btn" onclick="start('growth')">🌱 Spiritual Growth</button>
                <button class="btn" onclick="start('teens')">🙌 Teen Life</button>
            `;
        }

        function start(cat) {
            currentQuestions = database[cat];
            currentIndex = 0;
            if (!currentQuestions || currentQuestions.length === 0) return alert("Content coming soon!");
            document.getElementById('p-container').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('p-bar').style.width = ((currentIndex / currentQuestions.length) * 100) + "%";

            document.getElementById('main-display').innerHTML = `
                <div style="font-size:0.75rem; margin-bottom:10px; opacity:0.6;">QUESTION ${currentIndex + 1} OF ${currentQuestions.length}</div>
                <div class="question-box">${q.question}</div>
                <div id="options"></div>
            `;
            
            q.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = opt;
                b.onclick = () => {
                    const all = document.querySelectorAll('#options .btn');
                    all.forEach(btn => btn.style.pointerEvents = 'none');

                    const isCorrect = opt.trim().toLowerCase() === q.answer.trim().toLowerCase();
                    
                    if(isCorrect) {
                        b.classList.add('correct');
                        score++;
                    } else {
                        b.classList.add('wrong');
                        all.forEach(btn => {
                            if(btn.innerText.trim().toLowerCase() === q.answer.trim().toLowerCase()) {
                                btn.classList.add('reveal');
                            }
                        });
                    }

                    setTimeout(() => {
                        currentIndex++;
                        if (currentIndex < currentQuestions.length) renderQuestion();
                        else showFinish();
                    }, 2000);
                };
                document.getElementById('options').appendChild(b);
            });
        }

        function showFinish() {
            const percent = (score / currentQuestions.length) * 100;
            let msg = percent >= 70 ? "Victory! 🏆" : "Keep Studying! 📖";
            document.getElementById('p-bar').style.width = "100%";
            document.getElementById('main-display').innerHTML = `
                <h2>${msg}</h2>
                <div style="font-size:3.5rem; font-weight:800; margin:15px 0; color:var(--primary);">${score}/${currentQuestions.length}</div>
                <button class="btn" onclick="showHome()" style="background:var(--primary); color:white;">Play Again</button>
            `;
        }

        init();
    </script>
</body>
</html>
