<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLM Quiz | Excellence Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px 20px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #sync-status {
            font-size: 0.8rem;
            margin-bottom: 30px;
            opacity: 0.7;
            color: #00ffcc;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #0f2027;
            border: none;
            padding: 18px;
            margin: 12px 0;
            width: 100%;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        .category-btn:active {
            transform: scale(0.96);
            background: var(--accent);
            color: white;
        }

        #quiz-screen {
            display: none;
        }

        .question-box {
            font-size: 1.2rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .option-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 10px;
            text-align: left;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div id="home-screen" class="container">
        <h1>Worshiplife Ministry</h1>
        <div id="sync-status">📡 Initializing Cloud Sync...</div>
        
        <button class="category-btn" onclick="startQuiz('old')">Old Testament</button>
        <button class="category-btn" onclick="startQuiz('new')">New Testament</button>
        <button class="category-btn" onclick="startQuiz('growth')">Spiritual Growth</button>
        <button class="category-btn" onclick="startQuiz('teens')">Teen Life</button>
    </div>

    <div id="quiz-screen" class="container">
        <div class="question-box" id="question-text">Loading...</div>
        <div id="options-container"></div>
        <button class="category-btn" style="margin-top:20px; background:#ff4b2b; color:white;" onclick="location.reload()">Exit Quiz</button>
    </div>

    <script>
        // Use your actual Sheet ID here
        const SHEET_ID = "1RrgebuElaDoseB0t-wxl288SyN3PCjanxl8vw7Yxxq0";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`;
        
        let database = { "old": [], "new": [], "growth": [], "teens": [] };

        async function syncWithCloud() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                processData(csvData);
            } catch (error) {
                console.error("Sync failed:", error);
                document.getElementById('sync-status').innerText = "⚠️ Offline Mode";
            }
        }

        function processData(csv) {
            const rows = csv.split('\n').slice(1); // Skip Header
            let count = 0;

            rows.forEach(row => {
                // Use comma for standard Google Sheets CSV
                const cols = row.split(','); 
                
                if (cols.length >= 4) {
                    const category = cols[0].trim().toLowerCase();
                    const entry = {
                        question: cols[1].trim(),
                        options: cols[2].split(';').map(o => o.trim()),
                        answer: cols[3].trim()
                    };

                    // Direct mapping
                    if (database[category]) {
                        database[category].push(entry);
                        count++;
                    }
                }
            });

            document.getElementById('sync-status').innerText = `✅ Ministry Cloud Synced: ${count} Questions`;
        }

        function startQuiz(cat) {
            const questions = database[cat];
            
            if (!questions || questions.length === 0) {
                alert("This category is empty in the Cloud Sheet!");
                return;
            }

            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            showQuestion(questions[0]);
        }

        function showQuestion(q) {
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === q.answer) {
                        btn.style.background = "#28a745";
                        alert("Correct! Keep growing!");
                    } else {
                        btn.style.background = "#dc3545";
                        alert("Not quite. Check your Bible!");
                    }
                };
                container.appendChild(btn);
            });
        }

        // Start the sync when page loads
        syncWithCloud();
    </script>
</body>
</html>
